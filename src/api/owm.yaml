openapi: 3.0.3
info:
  title: OpenWeatherMap Current Weather
  version: "2.5"
servers:
  - url: https://api.openweathermap.org/data/2.5
paths:
  /weather:
    get:
      operationId: getCurrentWeather
      summary: Current weather by city name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: appid
          in: query
          required: false
          schema:
            type: string
        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [standard, metric, imperial]
            default: metric
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherResponse"
        "404":
          description: City not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    WeatherResponse:
      type: object
      required: [coord, weather, main, wind, name, sys, cod]
      properties:
        coord:
          type: object
          properties:
            lon: { type: number }
            lat: { type: number }
        weather:
          type: array
          items:
            type: object
            required: [id, main, description, icon]
            properties:
              id: { type: integer }
              main: { type: string }
              description: { type: string }
              icon: { type: string }
        main:
          type: object
          required: [temp, feels_like, temp_min, temp_max, pressure, humidity]
          properties:
            temp: { type: number }
            feels_like: { type: number }
            temp_min: { type: number }
            temp_max: { type: number }
            pressure: { type: integer }
            humidity: { type: integer }
        wind:
          type: object
          required: [speed]
          properties:
            speed: { type: number }
            deg: { type: integer }
        name: { type: string }
        sys:
          type: object
          required: [country]
          properties:
            country: { type: string }
            sunrise: { type: integer }
            sunset: { type: integer }
        cod: { type: integer }
    ApiError:
      type: object
      properties:
        cod: { type: string }
        message: { type: string }
